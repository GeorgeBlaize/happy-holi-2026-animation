<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Holi 2026 Animation</title>


  <script src="https://cdn.tailwindcss.com"></script>

  <style>
   
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    .typing {
      overflow: hidden;
      white-space: nowrap;
      border-right: 4px solid white;
      animation: typing 10s steps(18, end) forwards, blink 0.8s step-end 5;
    }

    
    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 25px #ff4d4d, 0 0 40px #4dd2ff, 0 0 60px #ffff66; }
    }

    .glow {
      animation: glow 2s ease-in-out infinite alternate;
    }

   
    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0.2;
      }
    }

    .particle {
      animation: fall linear forwards;
    }
  </style>
</head>
<body class="m-0 h-screen overflow-hidden flex items-center justify-center font-sans text-white bg-[radial-gradient(circle_at_top,#1a1a1a,#000)]">


  <h1 id="title"
      class="absolute z-10 text-[8rem] tracking-wider text-center typing">
    Happy Holi 2026
  </h1>

  <canvas id="canvas" class="absolute top-0 left-0"></canvas>

  <script>
    const title = document.getElementById("title");


    setTimeout(() => {
      title.classList.add("glow");
      title.style.borderRight = "none"; 
    }, 4000);

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const colors = ['#ff4d4d', '#ffcc00', '#33cc33', '#3399ff', '#cc66ff', '#ff66b2'];

    function createParticle() {
      const p = document.createElement('div');
      p.className = 'particle absolute rounded-full pointer-events-none opacity-90';

      const size = Math.random() * 12 + 6;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.left = Math.random() * window.innerWidth + 'px';
      p.style.top = '-20px';
      p.style.animationDuration = (Math.random() * 3 + 3) + 's';

      document.body.appendChild(p);
      setTimeout(() => p.remove(), 7000);
    }

    setInterval(createParticle, 120);

 
    canvas.addEventListener('click', (e) => {
      for (let i = 0; i < 25; i++) {
        splash(e.clientX, e.clientY);
      }
    });

    function splash(x, y) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 6 + 2;
      const radius = Math.random() * 4 + 2;
      const color = colors[Math.floor(Math.random() * colors.length)];

      let life = 60;
      function animate(px, py, vx, vy) {
        if (life-- <= 0) return;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.fill();
        requestAnimationFrame(() => animate(px + vx, py + vy, vx, vy + 0.15));
      }

      animate(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed);
    }
  </script>
</body>
</html>
